# 📊 Mục 9: Prometheus + Grafana stack
# Setup VPS:
#   cd /var/www/xoso66tv/scripts/monitoring
#   docker compose up -d
# Access:
#   Prometheus: http://VPS_IP:9090
#   Grafana:    http://VPS_IP:3030 (admin/admin lần đầu)
# Production: setup nginx reverse proxy + Basic Auth.

version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: x66-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9091:9090"   # port 9091 trên host (9090 trên VPS đã có app khác)
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: x66-grafana
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "127.0.0.1:3030:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: x66-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    networks:
      - monitoring

volumes:
  prometheus-data:
  grafana-data:

networks:
  monitoring:
    driver: bridge
