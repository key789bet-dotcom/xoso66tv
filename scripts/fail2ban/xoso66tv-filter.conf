# /etc/fail2ban/filter.d/xoso66tv.conf
#
# Parse PM2 log lines của format:
#   <pid>|<name> | <pm2-date>: [FAIL2BAN] <ISO> AUTH_LOGIN blocked ip=1.2.3.4 path=/api/auth/login
#
# Match list: AUTH_LOGIN, ADMIN_LOGIN, AUTH_REGISTER, AUTH_FORGOT, OTP_SEND, ADMIN_2FA
#
# Test: fail2ban-regex /root/.pm2/logs/xoso66tv-out.log /etc/fail2ban/filter.d/xoso66tv.conf

[Definition]

failregex = \[FAIL2BAN\]\s+\S+\s+(?:AUTH_LOGIN|ADMIN_LOGIN|AUTH_REGISTER|AUTH_FORGOT|OTP_SEND|ADMIN_2FA)\s+blocked\s+ip=<HOST>

ignoreregex =

# Datepattern: fail2ban tự auto-detect ISO timestamp ngay sau [FAIL2BAN]
# (KHÔNG cần khai báo - default detector handles ISO 8601)
