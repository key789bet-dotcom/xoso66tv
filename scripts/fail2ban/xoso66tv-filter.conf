# /etc/fail2ban/filter.d/xoso66tv.conf
#
# Parse PM2 log lines of format:
#   [FAIL2BAN] 2026-06-13T10:00:00.000Z AUTH_LOGIN blocked ip=1.2.3.4 path=/api/auth/login
#   [FAIL2BAN] 2026-06-13T10:00:00.000Z ADMIN_LOGIN blocked ip=1.2.3.4 path=/admin/login
#   [FAIL2BAN] 2026-06-13T10:00:00.000Z AUTH_REGISTER blocked ip=1.2.3.4 path=/api/auth/register
#   [FAIL2BAN] 2026-06-13T10:00:00.000Z ADMIN_2FA blocked ip=1.2.3.4 path=/api/auth/2fa/verify-setup
#
# Each match = 1 strike. Triggers ban via xoso66tv jail.

[Definition]

failregex = ^.*\[FAIL2BAN\] \S+ (AUTH_LOGIN|ADMIN_LOGIN|AUTH_REGISTER|AUTH_FORGOT|OTP_SEND|ADMIN_2FA) blocked ip=<HOST> path=\S+\s*$

ignoreregex =

# Datepattern khớp ISO 8601 timestamp ngay sau [FAIL2BAN]
datepattern = \[FAIL2BAN\] {DATE}
              %%Y-%%m-%%dT%%H:%%M:%%S
