# /etc/fail2ban/filter.d/xoso66tv.conf
#
# Parse line từ /var/log/xoso66tv-security.log:
#   [FAIL2BAN] 2026-06-13T10:11:29.565Z AUTH_LOGIN blocked ip=2a02:4780:5e:8123::1 path=/api/auth/login
#
# Note: dùng (?P<host>\S+) thay vì <HOST> macro vì <HOST> trong fail2ban < 1.0.3
# không match đúng IPv6 có nhiều `::`. (?P<host>\S+) match cả IPv4 + IPv6.

[Definition]

failregex = \[FAIL2BAN\]\s+\S+\s+(?:AUTH_LOGIN|ADMIN_LOGIN|AUTH_REGISTER|AUTH_FORGOT|OTP_SEND|ADMIN_2FA)\s+blocked\s+ip=(?P<host>\S+)

ignoreregex =
