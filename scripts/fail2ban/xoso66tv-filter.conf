# /etc/fail2ban/filter.d/xoso66tv.conf
#
# Parse line từ /var/log/xoso66tv-security.log:
#   [FAIL2BAN] 2026-06-13T10:11:29.565Z AUTH_LOGIN blocked ip=2a02:4780:5e:8123::1 path=/api/auth/login
#
# [INCLUDES] common.conf bắt buộc để fail2ban expand <HOST> macro

[INCLUDES]
before = common.conf

[Definition]

failregex = \[FAIL2BAN\]\s+\S+\s+(?:AUTH_LOGIN|ADMIN_LOGIN|AUTH_REGISTER|AUTH_FORGOT|OTP_SEND|ADMIN_2FA)\s+blocked\s+ip=<HOST>\s+path=

ignoreregex =

# Explicit ISO 8601 datepattern (tránh warning "no valid date/time found")
datepattern = ^\[FAIL2BAN\]\s+%%Y-%%m-%%dT%%H:%%M:%%S(?:[.,]%%f)?Z?\s
