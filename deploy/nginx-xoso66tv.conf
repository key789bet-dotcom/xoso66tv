# Nginx config cho xoso66tv.com
# Đặt tại: /etc/nginx/sites-available/xoso66tv.com
# Sau đó: ln -s /etc/nginx/sites-available/xoso66tv.com /etc/nginx/sites-enabled/
# Test: nginx -t
# Reload: systemctl reload nginx

# Upstream Node.js app
upstream xoso66tv_app {
    server 127.0.0.1:4000;
    keepalive 64;
}

# HTTP - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name xoso66tv.com www.xoso66tv.com;

    # Cho Let's Encrypt verify
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect tất cả còn lại sang HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name xoso66tv.com www.xoso66tv.com;

    # SSL certificates (Let's Encrypt sẽ tự điền sau khi chạy certbot)
    ssl_certificate     /etc/letsencrypt/live/xoso66tv.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xoso66tv.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # Upload limit (cho admin upload ảnh/icon)
    client_max_body_size 20M;

    # Static files - serve trực tiếp qua nginx (nhanh hơn)
    location /static/ {
        alias /var/www/xoso66tv/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon, robots, sitemap
    location = /favicon.ico { alias /var/www/xoso66tv/public/img/favicon.webp; access_log off; }
    location = /robots.txt  { alias /var/www/xoso66tv/public/robots.txt; access_log off; }

    # Tất cả request khác → Node.js app
    location / {
        proxy_pass http://xoso66tv_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }

    # Log
    access_log /var/log/nginx/xoso66tv-access.log;
    error_log  /var/log/nginx/xoso66tv-error.log warn;
}
